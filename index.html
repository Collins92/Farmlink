<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FarmLink</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
  body { background: #f5f5f5; }
 .header { background: #166534; color: white; text-align: center; padding: 25px 15px; }
 .container { max-width: 700px; margin: 20px auto; padding: 0 15px; }
 .card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 20px; }
  input, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; }
  button { padding: 12px; border: none; border-radius: 8px; background: #22c55e; color: white; font-weight: bold; cursor: pointer; }
 .btn-secondary { background: #2563eb; }
 .btn-outline { background: white; color: #2563eb; border: 2px solid #2563eb; }
 .support-box { background: #f0fdf4; border: 2px dashed #00a651; padding: 20px; border-radius: 10px; text-align: center; }
 .hidden { display: none; }
 .item, .user { border: 1px solid #ddd; padding: 15px; border-radius: 10px; margin-bottom: 12px; }
 .badge { background: #22c55e; color: white; padding: 4px 8px; border-radius: 5px; font-size: 12px; margin-right: 5px; }
 .chat-box { border: 1px solid #ddd; height: 350px; overflow-y: scroll; padding: 10px; background: #f9fafb; border-radius: 8px; margin-bottom: 10px; }
 .msg { padding: 8px 12px; margin: 5px 0; border-radius: 10px; max-width: 80%; clear: both; }
 .msg-me { background: #22c55e; color: white; float: right; }
 .msg-them { background: #e5e7eb; float: left; }
 .chat-input-group { display: flex; gap: 8px; }
 .chat-input-group input { flex: 1; }
</style>
</head>
<body>

<div class="header">
  <h1>🌾 FarmLink</h1>
  <p>Connecting Farmers Directly to Buyers</p>
</div>

<div class="container">

  <div class="support-box">
    <h3>❤️ Support FarmLink</h3>
    <h2 style="color:#00a651;">Pochi La Biashara: 0141146754</h2>
  </div>

  <div class="card" id="login-card">
    <h2>Login / Sign Up</h2>
    <input type="text" id="name" placeholder="Your Name">
    <select id="role">
      <option value="">Select Role</option>
      <option value="farmer">Farmer / Seller</option>
      <option value="buyer">Buyer</option>
    </select>
    <input type="email" id="email" placeholder="Enter Email">
    <input type="password" id="password" placeholder="Enter Password">
    <button onclick="signUp()">Sign Up</button>
    <button class="btn-secondary" onclick="login()">Login</button>
    <p id="auth-status" style="margin-top:10px; color:green;"></p>
  </div>

  <div class="hidden" id="app-section">
    <div class="card">
      <h2>Welcome <span id="user-name"></span> <span class="badge" id="user-role"></span></h2>
      <button onclick="showProfileForm()" class="btn-outline">⚙️ Edit Profile</button>
      <button onclick="showAddForm()" id="add-btn" class="hidden">+ Post Item</button>
      <button onclick="showChatList()" class="btn-secondary">💬 Messages</button>
    </div>

    <!-- EDIT PROFILE FORM -->
    <div class="card hidden" id="profile-form">
      <h3>⚙️ Edit Your Farmer Profile</h3>
      <input type="text" id="edit-name" placeholder="Your Full Name">
      <select id="edit-county">
        <option value="">Select County</option>
        <option>Uasin Gishu</option><option>Nakuru</option><option>Nairobi</option>
        <option>Kisumu</option><option>Trans Nzoia</option><option>Bungoma</option>
        <option>Kericho</option><option>Other</option>
      </select>
      <input type="text" id="edit-product" placeholder="Main Product You Sell. e.g: Maize, DAP, Potatoes">
      <button onclick="saveProfile()">Save Profile</button>
      <button onclick="hideProfileForm()" style="background:red;">Cancel</button>
    </div>

    <!-- FARMERS LIST -->
    <div class="card">
      <h3>👨‍🌾 Available Farmers</h3>
      <div id="users-list"></div>
    </div>

    <!-- ADD ITEM FORM -->
    <div class="card hidden" id="add-form">
      <h3>Post New Item</h3>
      <select id="category">
        <option value="">Category</option>
        <option>Crops</option><option>Fertilizer</option>
        <option>Farm Tools</option><option>Equipment</option>
        <option>Seeds</option><option>Other</option>
      </select>
      <input type="text" id="item-name" placeholder="Item Name">
      <input type="text" id="item-price" placeholder="Price">
      <input type="text" id="item-location" placeholder="Location">
      <button onclick="addItem()">Post</button>
      <button onclick="hideAddForm()" style="background:red;">Cancel</button>
    </div>

    <!-- CHAT LIST -->
    <div class="card hidden" id="chat-list">
      <h3>💬 Your Chats</h3>
      <div id="chat-contacts"></div>
      <button onclick="hideChatList()" style="background:red; margin-top:10px;">Close</button>
    </div>

    <!-- CHAT WINDOW -->
    <div class="card hidden" id="chat-window">
      <h3>Chat with <span id="chat-with"></span></h3>
      <div class="chat-box" id="chat-box"></div>
      <div class="chat-input-group">
        <input type="text" id="chat-input" placeholder="Type message..." onkeypress="if(event.key==='Enter') sendMessage()">
        <button onclick="sendMessage()">Send</button>
      </div>
      <button onclick="closeChat()" style="background:red; width:100%; margin-top:8px;">Close</button>
    </div>

    <!-- LISTINGS -->
    <div class="card">
      <h3>🛒 Available Produce & Farm Inputs</h3>
      <div id="items-list"></div>
    </div>
  </div>

</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
  import { getDatabase, ref, push, onValue, set, update } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCFmIxXg27hGvssJheCYRbGBEr2H-ZEF08",
    authDomain: "farm-link-global.firebaseapp.com",
    databaseURL: "https://farm-link-global-default-rtdb.firebaseio.com",
    projectId: "farm-link-global"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getDatabase(app);

  const nameEl = document.getElementById('name');
  const roleEl = document.getElementById('role');
  const emailEl = document.getElementById('email');
  const passwordEl = document.getElementById('password');
  const authStatusEl = document.getElementById('auth-status');
  const itemsListEl = document.getElementById('items-list');
  const usersListEl = document.getElementById('users-list');

  let currentUser = null;
  let activeChat = null;

  window.signUp = () => {
    createUserWithEmailAndPassword(auth, emailEl.value, passwordEl.value)
   .then((userCredential) => {
      currentUser = {name: nameEl.value, role: roleEl.value, email: emailEl.value, uid: userCredential.user.uid, county:"", mainProduct:""};
      set(ref(db, 'users/' + userCredential.user.uid), currentUser);
      authStatusEl.innerText = "Account created! Now edit your profile.";
      showApp();
    })
   .catch(e => alert(e.message));
  }

  window.login = () => {
    signInWithEmailAndPassword(auth, emailEl.value, passwordEl.value)
   .then((userCredential) => {
      onValue(ref(db, 'users/' + userCredential.user.uid), (snap) => {
        currentUser = snap.val();
        showApp();
      }, {onlyOnce: true});
    })
   .catch(e => alert(e.message));
  }

  function showApp() {
    document.getElementById('login-card').classList.add('hidden');
    document.getElementById('app-section').classList.remove('hidden');
    document.getElementById('user-name').innerText = currentUser.name;
    document.getElementById('user-role').innerText = currentUser.role.toUpperCase();
    if(currentUser.role === 'farmer') document.getElementById('add-btn').classList.remove('hidden');
    loadUsers();
    loadItems();
  }

  // PROFILE FUNCTIONS
  window.showProfileForm = () => {
    document.getElementById('profile-form').classList.remove('hidden');
    document.getElementById('edit-name').value = currentUser.name || "";
    document.getElementById('edit-county').value = currentUser.county || "";
    document.getElementById('edit-product').value = currentUser.mainProduct || "";
  }
  window.hideProfileForm = () => document.getElementById('profile-form').classList.add('hidden');

  window.saveProfile = () => {
    const updates = {
      name: document.getElementById('edit-name').value,
      county: document.getElementById('edit-county').value,
      mainProduct: document.getElementById('edit-product').value
    };
    update(ref(db, 'users/' + currentUser.uid), updates);
    currentUser = {...currentUser, ...updates};
    document.getElementById('user-name').innerText = currentUser.name;
    hideProfileForm();
    alert("Profile Updated!");
    loadUsers(); // refresh list
  }

  window.showAddForm = () => document.getElementById('add-form').classList.remove('hidden');
  window.hideAddForm = () => document.getElementById('add-form').classList.add('hidden');

  window.addItem = () => {
    const newItem = {name:document.getElementById('item-name').value, price:document.getElementById('item-price').value, location:document.getElementById('item-location').value, category:document.getElementById('category').value, seller:currentUser.name, sellerEmail:currentUser.email, sellerUid: currentUser.uid};
    push(ref(db, 'items'), newItem);
    hideAddForm();
  }

  function loadItems() {
    onValue(ref(db, 'items'), (snapshot) => {
      const data = snapshot.val() || {};
      const items = Object.values(data);
      itemsListEl.innerHTML = items.map(item => `
        <div class="item">
          <span class="badge">${item.category}</span>
          <h4>${item.name} - ${item.price}</h4>
          <p>📍 ${item.location} | 👤 ${item.seller}</p>
          <button style="width:100%; background:#2563eb; margin-top:8px;" onclick="openChat('${item.sellerEmail}', '${item.seller}')">💬 Chat Seller</button>
        </div>
      `).join('');
    });
  }

  function loadUsers() {
    onValue(ref(db, 'users'), (snapshot) => {
      const data = snapshot.val() || {};
      const users = Object.values(data).filter(u => u.uid !== currentUser.uid && u.role === 'farmer');
      usersListEl.innerHTML = users.map(u => `
        <div class="user">
          <h4>👨‍🌾 ${u.name}</h4>
          <p><span class="badge">📍 ${u.county || 'No County'}</span> <span class="badge">🌽 ${u.mainProduct || 'No Product'}</span></p>
          <button style="width:100%; background:#2563eb; margin-top:8px;" onclick="openChat('${u.email}', '${u.name}')">💬 Chat ${u.name}</button>
        </div>
      `).join('');
    });
  }

  // CHAT FUNCTIONS
  window.openChat = (email, name) => {
    activeChat = email.replace('.', ',');
    document.getElementById('chat-with').innerText = name;
    document.getElementById('chat-window').classList.remove('hidden');
    loadChat();
  }

  window.closeChat = () => document.getElementById('chat-window').classList.add('hidden');

  window.showChatList = () => {
    document.getElementById('chat-list').classList.remove('hidden');
    onValue(ref(db, 'chats'), (snapshot) => {
      const data = snapshot.val() || {};
      let contacts = new Set();
      Object.keys(data).forEach(key => {
        if(key.includes(currentUser.email.replace('.', ','))) {
          contacts.add(key.split('-').find(e => e !== currentUser.email.replace('.', ',')));
        }
      });
      document.getElementById('chat-contacts').innerHTML = contacts.size?
        [...contacts].map(c => `<button onclick="openChat('${c.replace(',', '.')}', '${c}')" style="width:100%; margin:5px 0;">${c.replace(',', '.')}</button>`).join('')
        : "<p>No messages yet</p>";
    });
  }

  window.hideChatList = () => document.getElementById('chat-list').classList.add('hidden');

  window.sendMessage = () => {
    const msg = document.getElementById('chat-input').value;
    if(!msg || !activeChat) return;
    const chatId = [currentUser.email.replace('.', ','), activeChat].sort().join('-');
    push(ref(db, 'chats/' + chatId), {
      from: currentUser.name,
      fromEmail: currentUser.email,
      text: msg,
      time: Date.now()
    });
    document.getElementById('chat-input').value = '';
  }

  function loadChat() {
    const chatId = [currentUser.email.replace('.', ','), activeChat].sort().join('-');
    onValue(ref(db, 'chats/' + chatId), (snapshot) => {
      const data = snapshot.val() || {};
      const msgs = Object.values(data);
      document.getElementById('chat-box').innerHTML = msgs.map(m => `
        <div class="msg ${m.fromEmail === currentUser.email? 'msg-me' : 'msg-them'}">
          <b>${m.from}:</b> ${m.text}
        </div>
      `).join('');
      document.getElementById('chat-box').scrollTop = document.getElementById('chat-box').scrollHeight;
    });
  }
</script>
</body>
                                                       </html>
