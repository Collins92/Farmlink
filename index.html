<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FarmLink - Support Farmers</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
  body { background: #f5f5f5; }
  .header { background: #22c55e; color: white; text-align: center; padding: 25px 15px; }
  .container { max-width: 600px; margin: 20px auto; padding: 0 15px; }
  .card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
  input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; }
  .btn-group { display: flex; gap: 10px; }
  button { flex: 1; padding: 12px; border: none; border-radius: 8px; background: #22c55e; color: white; font-weight: bold; cursor: pointer; }
  .btn-mpesa { background: #00a651; margin-top: 10px; width: 100%; }
  .support-box { background: #f0fdf4; border: 2px dashed #00a651; padding: 15px; border-radius: 10px; margin: 15px 0; text-align: center; }
  .hidden { display: none; }
</style>
</head>
<body>

<div class="header">
  <h1>🌾 FarmLink</h1>
  <p>Connecting Farmers Directly to Buyers</p>
</div>

<div class="container">

  <!-- SUPPORT BOX -->
  <div class="card support-box">
    <h3>❤️ Support FarmLink</h3>
    <p>Help us keep this platform free for farmers</p>
    <h2 style="color:#00a651; margin:10px 0;">Pochi La Biashara: 0141146754</h2>
    <p>Send any amount to support</p>
  </div>

  <div class="card" id="login-card">
    <h2>Login / Sign Up</h2>
    <input type="email" id="email" placeholder="Enter Email" value="emporerotieno369@gmail.com">
    <input type="password" id="password" placeholder="Enter Password">
    <div class="btn-group">
      <button onclick="signUp()">Sign Up</button>
      <button onclick="login()">Login</button>
    </div>
    <p id="auth-status" style="margin-top:10px; color:#16a34a;"></p>
  </div>

  <div class="card hidden" id="app-section">
    <h2>Dashboard</h2>
    
    <div class="card">
      <h3>Available Produce</h3>
      <div id="produce-list"></div>
    </div>

    <div class="card support-box">
      <h3>💚 Love this platform?</h3>
      <p>Support us via Pochi La Biashara</p>
      <h2 style="color:#00a651;">0141146754</h2>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCFmIxXg27hGvssJheCYRbGBEr2H-ZEF08",
    authDomain: "farm-link-global.firebaseapp.com",
    projectId: "farm-link-global",
    storageBucket: "farm-link-global.firebasestorage.app",
    messagingSenderId: "178314019522",
    appId: "1:178314019522:web:d06e3b70d575725f70315b"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  window.signUp = () => {
    createUserWithEmailAndPassword(auth, email.value, password.value)
    .then(() => { authStatus.innerText="Account created!"; showApp(); })
    .catch(e => alert(e.message));
  }
  
  window.login = () => {
    signInWithEmailAndPassword(auth, email.value, password.value)
    .then(() => { authStatus.innerText="Logged in!"; showApp(); })
    .catch(e => alert(e.message));
  }

  function showApp() {
    document.getElementById('login-card').classList.add('hidden');
    document.getElementById('app-section').classList.remove('hidden');
    produceList.innerHTML = `
      <div style="border:1px solid #ddd; padding:15px; border-radius:8px; margin-bottom:10px;">
        <h4>Maize - KSh 4500/bag</h4>
        <p>Eldoret</p>
        <button class="btn-mpesa" onclick="alert('Pay directly to farmer or Pochi 0141146754')">Pay with M-Pesa</button>
      </div>
      <div style="border:1px solid #ddd; padding:15px; border-radius:8px;">
        <h4>Beans - KSh 12000/bag</h4>
        <p>Nakuru</p>
        <button class="btn-mpesa" onclick="alert('Pay directly to farmer or Pochi 0141146754')">Pay with M-Pesa</button>
      </div>
    `;
  }
</script>
</body>
</html>
