m<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FarmLink - Connecting Farmers Directly to Buyers</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
  body { background: #f5f5f5; }
  .header { background: #22c55e; color: white; text-align: center; padding: 25px 15px; }
  .header h1 { font-size: 28px; margin-bottom: 8px; }
  .container { max-width: 600px; margin: 20px auto; padding: 0 15px; }
  .card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
  input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; }
  .btn-group { display: flex; gap: 10px; }
  button { flex: 1; padding: 12px; border: none; border-radius: 8px; background: #22c55e; color: white; font-weight: bold; cursor: pointer; }
  .chat-box { height: 250px; border: 1px solid #ddd; border-radius: 8px; padding: 10px; overflow-y: auto; background: #fafafa; margin-bottom: 10px; }
  .message { padding: 8px 12px; border-radius: 15px; margin: 5px 0; max-width: 75%; }
  .buyer { background: #dcfce7; margin-left: auto; text-align:right; }
  .farmer { background: #e5e7eb; margin-right: auto; text-align:left; }
  .hidden { display: none; }
</style>
</head>
<body>

<div class="header">
  <h1>🌾 FarmLink</h1>
  <p>Connecting Farmers Directly to Buyers</p>
</div>

<div class="container">
  <div class="card">
    <h2>Login / Sign Up</h2>
    <input type="email" id="email" placeholder="Enter Email" value="emporerotieno369@gmail.com">
    <input type="password" id="password" placeholder="Enter Password">
    <div class="btn-group">
      <button onclick="signUp()">Sign Up</button>
      <button onclick="login()">Login</button>
    </div>
    <p id="auth-status" style="margin-top:10px; color:#16a34a;"></p>
  </div>

  <div class="card" id="produce-section">
    <h2>Available Produce</h2>
    <div id="produce-list"><p>Please login to view produce</p></div>
  </div>

  <div class="card hidden" id="chat-section">
    <h2>💬 Chat</h2>
    <div class="chat-box" id="chatBox"></div>
    <div style="display:flex; gap:8px;">
      <input type="text" id="chatInput" placeholder="Type message...">
      <button onclick="sendMessage()">Send</button>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
  import { getFirestore, collection, addDoc, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

  // YOUR REAL FIREBASE CONFIG
  const firebaseConfig = {
    apiKey: "AIzaSyCFmIxXg27hGvssJheCYRbGBEr2H-ZEF08",
    authDomain: "farm-link-global.firebaseapp.com",
    projectId: "farm-link-global",
    storageBucket: "farm-link-global.firebasestorage.app",
    messagingSenderId: "178314019522",
    appId: "1:178314019522:web:d06e3b70d575725f70315b"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  // GET ELEMENTS PROPERLY
  const email = document.getElementById('email');
  const password = document.getElementById('password');
  const authStatus = document.getElementById('auth-status');
  const produceList = document.getElementById('produce-list');
  const chatSection = document.getElementById('chat-section');
  const chatBox = document.getElementById('chatBox');
  const chatInput = document.getElementById('chatInput');

  window.signUp = () => {
    createUserWithEmailAndPassword(auth, email.value, password.value)
    .then(() => { authStatus.innerText="Signed up successfully!"; showLoggedIn(); })
    .catch(e => alert(e.message));
  }
  
  window.login = () => {
    signInWithEmailAndPassword(auth, email.value, password.value)
    .then(() => { authStatus.innerText="Logged in successfully!"; showLoggedIn(); })
    .catch(e => alert(e.message));
  }
  
  function showLoggedIn(){
    produceList.innerHTML = `<div style="border:1px solid #ddd; padding:12px; border-radius:8px; margin-bottom:10px;"><h3>Maize - KSh 4500</h3><p>Farmer: John from Eldoret</p></div>`;
    chatSection.classList.remove('hidden');
    
    const q = query(collection(db, "chats"), orderBy("createdAt"));
    onSnapshot(q, (snapshot) => {
      chatBox.innerHTML = "";
      snapshot.forEach((doc) => {
        const data = doc.data();
        const className = data.from === auth.currentUser.uid ? "buyer" : "farmer";
        chatBox.innerHTML += `<div class="message ${className}">${data.text}</div>`;
      });
      chatBox.scrollTop = chatBox.scrollHeight;
    });
  }

  window.sendMessage = async () => {
    if(chatInput.value.trim() === "" || !auth.currentUser) return;
    await addDoc(collection(db, "chats"), {
      text: chatInput.value,
      from: auth.currentUser.uid,
      createdAt: new Date()
    });
    chatInput.value = "";
  }
</script>
</body>
</html>
